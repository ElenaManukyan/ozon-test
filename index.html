<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width" />
    <title>Progress Test</title>
    <style>
        .downloadContainer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 40px;
            max-width: 320px;
            min-height: 100vh;
            background-color: #fff;
        }

        .downloadContainer span {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 14px;
            font-family: sans-serif;
        }

        @media screen and (min-width: 568px) {
            .downloadContainer {
                max-width: 568px;
                min-height: 320px;
                flex-direction: row;
                gap: 100px;
            }
        }

        .downloadPage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
            font-family: sans-serif;
            font-size: 14px;
        }

        .progressElement.hidden {
            visibility: hidden;
        }

        .loadRingContainer {
            fill: none;
            stroke-width: 10;
            transform: rotate(-90deg); 
        }

        .loadRingContainer.animated {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(270deg); }
        }

        .circleAll {
            stroke: #e6e9ef;
        }

        .circleFilled {
            stroke: #005cff;
        }

        .controlPanelForRingProgress {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controlItemForRingProgress {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .controlItemForRingProgress input {
            width: 50px;
            height: 25px;
            margin: 0;
            padding: 0;
        }

        .controlItemForRingProgress input[type="number"] {
            border-radius: 15px;
            border: 1px solid #000;
            text-align: center;
        }

        .controlItemForRingProgress input[type="checkbox"] {
            appearance: none;
            background-color: #e6e9ef;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }

        .controlItemForRingProgress input[type="checkbox"]:checked {
            background-color: #005eff;
        }

        .controlItemForRingProgress input[type="checkbox"]::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #fff;
            top: 2.5px;
            left: 2px;
        }


        .controlItemForRingProgress input[type="checkbox"]:checked::before {
            transform: translateX(25px);
        }
    </style>
</head>
<body class="downloadPage">

<div class="downloadContainer">
    <span>Progress</span>
    <div class="progressElement" id="progressElement">
        <svg class="loadRingContainer" width="120" height="120">
            <circle class="circleAll" cx="60" cy="60" r="52"></circle>
            <circle class="circleFilled" id="ring" cx="60" cy="60" r="52"></circle>
        </svg>
    </div>

    <div class="controlPanelForRingProgress">
        <div class="controlItemForRingProgress">
            <input type="number" id="valueInput" value="75" min="0" max="100">
            <label for="valueInput">Value</label>
        </div>
        <div class="controlItemForRingProgress">
            <input type="checkbox" id="animatingSwitch">
            <label  for="animatingSwitch">Animate</label>
        </div>
        <div class="controlItemForRingProgress">
            <input type="checkbox" id="hideSwitch">
            <label for="hideSwitch">Hide</label>
        </div>
    </div>
</div>

<script>
    const ringDownload = document.getElementById('ring');
    const ringProgress = document.getElementById('progressElement');
    const svgEl = ringDownload.parentElement;

    const ringRadius = ringDownload.r.baseVal.value;
    const lengthCircle = 2 * Math.PI * ringRadius;

    const stateProgressBlock = {
        currentState: 'Normal',
        animatedState: (targetChecked) => svgEl.classList.toggle('animated', targetChecked),
        hiddenState: (targetChecked) => ringProgress.classList.toggle('hidden', targetChecked),
    };

    ringDownload.style.strokeDasharray = `${lengthCircle} ${lengthCircle}`;

    function changeArcSize(sizeOfArc) {
        if (stateProgressBlock.currentState === 'Normal') {
            const offset = lengthCircle - (sizeOfArc / 100 * lengthCircle);
            ringDownload.style.strokeDashoffset = offset;
        }
    }

    const START_SIZE = 75;
    changeArcSize(START_SIZE);

    document.getElementById('valueInput').addEventListener('input', (e) => {
        if (e.target.value >= 0 && e.target.value <=100) {
            changeArcSize(e.target.value);
        } else {
            changeArcSize(0);
        }
    });

    document.getElementById('animatingSwitch').addEventListener('change', (e) => {
        stateProgressBlock.currentState = e.target.checked ? 'Animated' : 'Normal';
        stateProgressBlock.animatedState(e.target.checked);
    });

    document.getElementById('hideSwitch').addEventListener('change', (e) => {
        stateProgressBlock.currentState = e.target.checked ? 'Hidden' : 'Normal';
        stateProgressBlock.hiddenState(e.target.checked);
    });
</script>

</body>
</html>
